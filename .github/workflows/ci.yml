name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────
  # No instala torch — es instantáneo. Falla rápido si hay errores de estilo.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar ruff
        run: pip install ruff

      - name: Verificar estilo de código
        run: ruff check .

      - name: Verificar formato
        run: ruff format --check .

  # ── Job 2: Smoke tests ──────────────────────────────────────────────
  # Instala torch CPU (sin CUDA) para mantener el CI rápido (~2 min).
  # Verifica que el código corre, no que el modelo esté bien entrenado.
  smoke-test:
    name: Smoke tests (pytest)
    runs-on: ubuntu-latest
    needs: lint          # Solo corre si el lint pasó

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Caché de pip — la key incluye "v2" para forzar cache limpio
      - name: Cachear dependencias pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v2-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-v2-

      # numpy debe instalarse ANTES que torch: torch verifica numpy al importarse
      # por primera vez, y si no lo encuentra lo marca como no disponible
      - name: Instalar todas las dependencias
        run: |
          pip install "numpy>=1.24.0,<2.0.0"
          pip install torch==2.1.2 torchvision==0.16.2 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install Pillow scikit-learn pandas scipy matplotlib tqdm \
                      transformers gradio opencv-python-headless
          pip install -r requirements-dev.txt

      - name: Correr smoke tests
        run: pytest tests/ -v --tb=short
