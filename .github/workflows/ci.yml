name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────
  # No instala torch — es instantáneo. Falla rápido si hay errores de estilo.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar ruff
        run: pip install -r requirements-dev.txt

      - name: Check code style
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # ── Job 2: Unit + integration tests ───────────────────────────────
  # Installs torch CPU (no CUDA) to keep CI fast (~2 min).
  # Covers model architecture, API endpoints, and predictor unit tests.
  # Locust load tests run manually: locust -f locustfile.py --host http://localhost:8000
  smoke-test:
    name: Unit + integration tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # pip cache keyed on all dependency files — torch version change invalidates it
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-v3-${{ hashFiles('requirements.txt', 'requirements-dev.txt', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-v3-

      # numpy must be installed before torch: torch checks for numpy on first import
      - name: Install all dependencies
        run: |
          pip install "numpy>=1.24.0,<2.0.0"
          pip install torch==2.3.1 torchvision==0.18.1 \
            --index-url https://download.pytorch.org/whl/cpu
          pip install Pillow scikit-learn pandas scipy matplotlib tqdm \
                      transformers gradio opencv-python-headless \
                      fastapi "uvicorn[standard]" python-multipart \
                      prometheus-client structlog httpx locust
          pip install -r requirements-dev.txt

      - name: Run smoke and API tests
        run: pytest tests/ -v --tb=short
