name: ductos_env
channels:
  - pytorch        # canal oficial para PyTorch + CUDA
  - nvidia         # drivers CUDA
  - conda-forge    # paquetes actualizados
  - defaults

dependencies:
  - python=3.10

  # ── PyTorch (con soporte CUDA 11.8 — elimina cudatoolkit si solo usas CPU) ──
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - torchaudio>=2.0.0
  - pytorch-cuda=11.8   # quita esta línea si no tienes GPU NVIDIA

  # ── Ciencia de datos ──────────────────────────────────────────────
  - numpy>=1.24,<2.0
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7

  # ── Jupyter ───────────────────────────────────────────────────────
  - ipykernel
  - jupyter

  # ── Utilidades del sistema ────────────────────────────────────────
  - pip

  - pip:
    # Visión
    - Pillow>=9.5.0
    - opencv-python>=4.7.0

    # Modelos y NLP
    - transformers>=4.35.0

    # UI / demo
    - gradio>=4.0.0

    # Utilidades
    - tqdm>=4.65.0
    - pycocotools>=2.0.7
