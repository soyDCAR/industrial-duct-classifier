version: "3.9"

# ── Usage ──────────────────────────────────────────────────────────────
#
# Production API (CPU, ~800 MB image):
#   docker compose up api
#
# Gradio demo (~1.5 GB image):
#   docker compose up demo
#
# CLI batch prediction:
#   docker compose run --rm api python predict.py img/ --batch --output results.csv
#
# GPU: rebuild the api service on top of pytorch/pytorch:2.1.2-cuda11.8-*
#      and set CUDA_VISIBLE_DEVICES=0 in environment.
# ──────────────────────────────────────────────────────────────────────

x-model-volumes: &model-volumes
  - ./modelo_ductos_multitarea_efnet.pth:/app/modelo_ductos_multitarea_efnet.pth:ro
  - ./class_mapping.json:/app/class_mapping.json:ro

services:

  # ── Production inference API ───────────────────────────────────────
  api:
    build:
      context: .
      target: api          # uses the ~800 MB stage from Dockerfile
    image: ductos:api
    volumes: *model-volumes
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: modelo_ductos_multitarea_efnet.pth
      MAPPING_PATH: class_mapping.json

  # ── Gradio interactive demo ────────────────────────────────────────
  demo:
    build:
      context: .
      target: demo         # uses the ~1.5 GB stage from Dockerfile
    image: ductos:demo
    volumes: *model-volumes
    ports:
      - "7860:7860"
    environment:
      MODEL_PATH: modelo_ductos_multitarea_efnet.pth
      MAPPING_PATH: class_mapping.json
