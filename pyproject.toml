[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # errores de estilo (pycodestyle)
    "F",   # errores lógicos (pyflakes): imports no usados, variables no definidas
    "I",   # orden de imports (isort)
    "UP",  # sugerencias de Python moderno (pyupgrade)
]
ignore = [
    "E501",  # línea demasiado larga — ya controlada por line-length
]

[tool.ruff.lint.per-file-ignores]
# Notebooks: different style from production scripts
"*.ipynb" = ["E401", "E402", "F401", "I001"]
# demo/app.py manipulates sys.path before imports (needed for standalone execution)
"demo/app.py" = ["E402"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"
